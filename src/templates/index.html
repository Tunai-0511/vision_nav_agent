<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧導航 - 戶外行動版</title>
    <style>
        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px 60px;
        }
        body {
            background-color: #000;
            color: #FFEA00;
            font-family: sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        #videoElement {
            width: 100vw;
            height: 50vh;
            object-fit: cover;
            background-color: #222;
        }
        #btnStart {
            background-color: #FFEA00;
            color: #000;
            font-size: 2.5rem;
            font-weight: bold;
            padding: 20px 40px;
            border: none;
            border-radius: 15px;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0px 8px 15px rgba(255, 234, 0, 0.4);
        }
        #btnStart:active {
            background-color: #CCBB00;
            transform: scale(0.98);
        }
        #modeToggle {
            background-color: #9c27b0;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            margin-top: 15px;
            cursor: pointer;
            box-shadow: 0px 4px 10px rgba(156, 39, 176, 0.3);
        }
        #modeToggle:active {
            background-color: #7b1fa2;
            transform: scale(0.98);
        }
        #modeIndicator {
            margin-top: 10px;
            font-size: 1rem;
            padding: 6px 16px;
            border-radius: 20px;
            background-color: #333;
            color: #aaa;
        }
        #modeIndicator.nav-mode {
            background-color: #4a148c;
            color: #e1bee7;
        }
        #modeIndicator.asst-mode {
            background-color: #1b5e20;
            color: #a5d6a7;
        }
        #btnVoice {
            background-color: #00e5ff;
            color: #000;
            font-size: 2.5rem;
            padding: 20px 30px;
            border: none;
            border-radius: 15px;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0px 8px 15px rgba(0, 229, 255, 0.4);
            display: none;
        }
        #btnVoice:active {
            background-color: #00b3cc;
            transform: scale(0.98);
        }
        #statusText {
            margin-top: 20px;
            font-size: 1.5rem;
            text-align: center;
            padding: 0 20px;
            font-weight: bold;
        }
        #btnSetHome {
            background-color: #ff9800;
            color: #000;
            font-size: 1rem;
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
        #homeStatus {
            margin-top: 8px;
            font-size: 0.95rem;
            color: #ccc;
            text-align: center;
            padding: 0 20px;
        }
        #btnSchedule {
            background-color: #4CAF50;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            margin-top: 15px;
            cursor: pointer;
            box-shadow: 0px 4px 10px rgba(76, 175, 80, 0.3);
        }
        #btnSchedule:active {
            background-color: #388E3C;
            transform: scale(0.98);
        }
        #schedulePanel {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin-top: 15px;
            gap: 12px;
        }
        #btnScheduleVoice {
            background-color: #00b3cc;
            color: #000;
            font-size: 1.2rem;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
        }
        #btnScheduleVoice:active {
            background-color: #0097A7;
            transform: scale(0.98);
        }
        #scheduleForm {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }
        #scheduleForm input {
            background: #333;
            color: #FFEA00;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        #scheduleForm input::placeholder {
            color: #888;
        }
        #scheduleForm button[type="submit"] {
            background-color: #4CAF50;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        #scheduleTodayList {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 5px;
        }
        .schedule-event-card {
            background: #222;
            border-radius: 10px;
            padding: 10px 14px;
            color: #FFEA00;
            font-size: 0.95rem;
        }
        .schedule-event-card .event-title {
            font-weight: bold;
            font-size: 1.05rem;
        }
        .schedule-event-card .event-time {
            color: #aaa;
            margin-top: 4px;
        }
        .schedule-event-card .event-location {
            color: #888;
            margin-top: 2px;
        }
        .schedule-empty {
            color: #666;
            font-size: 0.95rem;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
    <!-- 顯示攝影鏡頭 -->
    <video id="videoElement" autoplay playsinline muted></video>

    <div id="statusText">請按下按鈕以啟動導航 👇</div>
    <div style="display: flex; gap: 15px;">
        <button id="btnStart">啟動導航</button>
        <button id="btnVoice" title="語音輸入">🎤</button>
    </div>
    <div id="modeIndicator" class="nav-mode">🔊 導航模式</div>
    <button id="modeToggle">🔄 切換為助理模式</button>

    <button id="btnSetHome">🏠 把現在位置設為家</button>
    <div id="homeStatus">🏠 尚未設定家裡座標</div>

    <button id="btnSchedule">📅 行事曆</button>
    <div id="schedulePanel" style="display:none;">
        <button id="btnScheduleVoice">🎤 語音新增行事曆</button>
        <form id="scheduleForm">
            <input type="text" id="scheduleTitle" placeholder="事件標題" required>
            <input type="datetime-local" id="scheduleStart" placeholder="開始時間">
            <input type="datetime-local" id="scheduleEnd" placeholder="結束時間（選填）">
            <input type="text" id="scheduleLocation" placeholder="地點（選填）">
            <button type="submit">新增事件</button>
        </form>
        <div id="scheduleTodayList"></div>
    </div>

    <!-- 用來把影片截圖轉為圖片隱藏用的畫布 -->
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('videoElement');
        const btnStart = document.getElementById('btnStart');
        const statusText = document.getElementById('statusText');
        const btnVoice = document.getElementById('btnVoice');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const modeToggle = document.getElementById('modeToggle');
        const modeIndicator = document.getElementById('modeIndicator');

        let isRunning = false;
        let isAnalyzing = false;  // 【新增】檢查是否正在等待伺服器回應
        let analyzeInterval = null;
        let currentMode = 'navigation';  // 'navigation' | 'assistant'

        // 系統內建 TTS 語音發聲
        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                // 語速稍微加快
                utterance.rate = 1.3;
                window.speechSynthesis.speak(utterance);
            }
        }

        // 請求攝影機權限並啟動
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    // 強制使用後置主鏡頭
                    video: { facingMode: { ideal: "environment" } },
                    // 【修復 iOS Bug】一次到位請求獲得麥克風權限，讓 WebSpeechAPI 能順利繼承權限
                    audio: true
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("無法存取攝影機或麥克風:", err);
                statusText.innerText = "無法啟動設備！請確認 Safari 是否有允許這網頁使用相機與麥克風";
            }
        }

        // 語音輸入原生 Fallback (跨平台保證成功)
        let audioContext;
        let scriptProcessor;
        let audioStream;
        let recordingData = [];
        let isRecording = false;

        btnVoice.style.display = 'block';

        // 將 32-bit Float PCM 轉化為標準 16-bit WAV 格式 (給 Python 聽)
        function encodeWAV(samples, sampleRate) {
            let buffer = new ArrayBuffer(44 + samples.length * 2);
            let view = new DataView(buffer);
            let writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true); // Mono (單聲道)
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, samples.length * 2, true);
            let offset = 44;
            for (let i = 0; i < samples.length; i++) {
                let s = Math.max(-1, Math.min(1, samples[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                offset += 2;
            }
            return new Blob([view], { type: 'audio/wav' });
        }

        btnVoice.addEventListener('click', async () => {
            if (!isRunning) {
                speak("請先點擊啟動導航按鈕");
                return;
            }

            if (!isRecording) {
                // ============== 開始錄音 ==============
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                isAnalyzing = true;
                isRecording = true;
                btnVoice.innerText = "🛑";
                statusText.innerText = "🔴 錄音中...請講話。講完請再按一次按鈕。";

                try {
                    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    const AudioContextCls = window.AudioContext || window.webkitAudioContext;
                    audioContext = new AudioContextCls({ sampleRate: 16000 });
                    const source = audioContext.createMediaStreamSource(audioStream);
                    scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);

                    recordingData = [];
                    // 即時蒐集原始音訊碎片
                    scriptProcessor.onaudioprocess = (e) => {
                        const channelData = e.inputBuffer.getChannelData(0);
                        recordingData.push(new Float32Array(channelData));
                    };

                    source.connect(scriptProcessor);
                    scriptProcessor.connect(audioContext.destination);
                } catch (e) {
                    statusText.innerText = "無法取得麥克風權限！";
                    isRecording = false;
                    isAnalyzing = false;
                    btnVoice.innerText = "🎤";
                }
            } else {
                // ============== 停止錄音與發送 ==============
                isRecording = false;
                btnVoice.innerText = "🎤";
                statusText.innerText = "處理中，請稍候...";
                
                // 關閉硬體接口
                if (scriptProcessor) scriptProcessor.disconnect();
                if (audioStream) audioStream.getTracks().forEach(t => t.stop());
                if (audioContext && audioContext.state !== 'closed') audioContext.close();

                // 拼湊所有收集到的聲音片段
                let totalLength = recordingData.reduce((acc, val) => acc + val.length, 0);
                let mergedData = new Float32Array(totalLength);
                let offset = 0;
                for (let i = 0; i < recordingData.length; i++) {
                    mergedData.set(recordingData[i], offset);
                    offset += recordingData[i].length;
                }
                // 打膜為純淨的 WAV
                const wavBlob = encodeWAV(mergedData, 16000);

                let needPhoto = false;
                try {
                    const response = await fetch('/api/command_audio', {
                        method: 'POST',
                        body: wavBlob
                    });
                    if (response.ok) {
                        const result = await response.json();
                        if (result.reply) {
                            speak(result.reply);
                        }
                        statusText.innerText = `🗣️: ${result.text || "(無辨識內容)"}`;

                        // 如果需要截圖（偵測到「拍照」指令），立即拍攝並發送
                        if (result.need_photo && isRunning) {
                            // 【修復】解除 isAnalyzing 鎖定，否則 captureAndSendPhoto 第一行就會 return
                            needPhoto = true;
                            isAnalyzing = false;
                            captureAndSendPhoto();
                        }
                    }
                } catch (e) {
                    console.error("傳輸音軌失敗:", e);
                    statusText.innerText = "無法連線伺服器";
                } finally {
                    // 如果沒有觸發拍照，我們在此解除錄音的分析鎖。有觸發拍照的話它會自己管理鎖。
                    if(!needPhoto) {
                        isAnalyzing = false;
                    }
                }
            }
        });

        // 把當前畫面拍下來送到電腦的 API
        async function captureAndAnalyze() {
            // 如果系統暫停，或是上一個運算還沒結束，就不排隊發送新照片！
            if (!isRunning || isAnalyzing) return;
            
            isAnalyzing = true;
            
            // 【優化】將畫面縮短至 320x240，可以大幅降低傳輸時間與 LLM 視覺模組解析的 Token 數量
            canvas.width = 320;
            canvas.height = 240;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 【優化】把 JPG 壓縮比調降到 0.6 減少檔案大小
            const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
            const base64Data = dataUrl.split(',')[1];

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image_b64: base64Data })
                });

                // 當收到回應時，如果使用者已經按下了「停止導航」，就直接把這包遲來的結果丟掉！
                if (!isRunning) {
                    isAnalyzing = false;
                    return;
                }

                if (response.ok) {
                    const result = await response.json();
                    if (result.warning) {
                        statusText.innerText = "🗣️ 警告: " + result.warning;
                        // 導航模式才語音播報，助理模式只顯示
                        if (currentMode === 'navigation' && 'speechSynthesis' in window && !window.speechSynthesis.speaking) {
                            speak(result.warning);
                        }
                    } else {
                        statusText.innerText = currentMode === 'assistant' ? "🔇 前方安全（助理模式）" : "🟢 前方安全";
                        // 物件已經離開畫面了，直接閉嘴強制中斷，避免拖泥帶水
                        if ('speechSynthesis' in window && window.speechSynthesis.speaking) {
                            window.speechSynthesis.cancel();
                        }
                    }
                }
            } catch (err) {
                console.error("上傳大腦分析失敗:", err);
            } finally {
                // 收到回應或出錯後，解鎖讓下一張照片可以發送
                isAnalyzing = false;
            }
        }

        // 拍照模式：截圖並發送到 /api/photo
        async function captureAndSendPhoto() {
            if (!isRunning || isAnalyzing) return;

            isAnalyzing = true;
            statusText.innerText = "📸 拍攝中...";

            // 【優化】使用 JPEG 0.9 quality（足夠清晰且比 PNG 小 10-20 倍）
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            const base64Data = dataUrl.split(',')[1];

            // 把當前 GPS 一起送，PhotoJournal 才能記錄拍照地點
            const lat = latestPosition ? latestPosition.coords.latitude : null;
            const lng = latestPosition ? latestPosition.coords.longitude : null;

            try {
                const response = await fetch('/api/photo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: "拍照",
                        image_b64: base64Data,
                        lat: lat,
                        lng: lng
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.reply) {
                        speak(result.reply);
                    }
                    statusText.innerText = `🗣️: ${result.reply || "(已完成)"}`;
                }
            } catch (err) {
                console.error("發送截圖失敗:", err);
                statusText.innerText = "發送失敗";
            } finally {
                isAnalyzing = false;
            }
        }

        // ============== GPS 軌跡 + 回家偵測 ==============
        const btnSetHome = document.getElementById('btnSetHome');
        const homeStatus = document.getElementById('homeStatus');
        let watchId = null;
        let gpsInterval = null;
        let latestPosition = null;

        async function refreshHomeStatusOnce() {
            try {
                const r = await fetch('/api/home_status');
                const result = await r.json();
                if (result.has_home) {
                    homeStatus.innerText = result.is_home ? '🏠 在家' : '🚶 外出（家裡座標已設定）';
                } else {
                    homeStatus.innerText = '🏠 尚未設定家裡座標';
                }
            } catch (e) { /* ignore */ }
        }
        refreshHomeStatusOnce();

        btnSetHome.addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert('此瀏覽器不支援定位');
                return;
            }
            homeStatus.innerText = '⏳ 取得 GPS 中...';
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude, accuracy } = pos.coords;
                try {
                    const r = await fetch('/api/set_home', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ lat: latitude, lng: longitude })
                    });
                    const result = await r.json();
                    if (result.ok) {
                        speak('已設為家');
                        homeStatus.innerText = `🏠 已設定家 (精度 ±${Math.round(accuracy)}m)`;
                    } else {
                        homeStatus.innerText = '❌ 設定失敗：' + result.error;
                    }
                } catch (e) {
                    homeStatus.innerText = '❌ 連線失敗';
                }
            }, (err) => {
                homeStatus.innerText = '❌ 無法取得位置：' + err.message;
            }, { enableHighAccuracy: true, timeout: 15000 });
        });

        function startGpsTracking() {
            if (!navigator.geolocation || watchId !== null) return;
            watchId = navigator.geolocation.watchPosition(
                (pos) => { latestPosition = pos; },
                (err) => console.warn('GPS error:', err.message),
                { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
            );
            // 每 15 秒上傳一次最新點
            gpsInterval = setInterval(sendLatestPosition, 15000);
            sendLatestPosition();  // 馬上送一次（如果已經有點）
        }

        function stopGpsTracking() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            if (gpsInterval) {
                clearInterval(gpsInterval);
                gpsInterval = null;
            }
        }

        async function sendLatestPosition() {
            if (!latestPosition) return;
            const { latitude, longitude, accuracy } = latestPosition.coords;
            try {
                const r = await fetch('/api/location', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat: latitude, lng: longitude, accuracy })
                });
                const result = await r.json();
                if (result.ok) updateHomeStatusUI(result);
            } catch (e) { /* ignore network blip */ }
        }

        function updateHomeStatusUI(s) {
            if (s.distance_m === null || s.distance_m === undefined) {
                homeStatus.innerText = '🏠 尚未設定家裡座標';
                return;
            }
            const tag = s.is_home ? '🏠 在家' : '🚶 外出';
            const streakMin = Math.floor(s.streak_seconds / 60);
            const streakSec = Math.floor(s.streak_seconds % 60);
            const streakText = s.streak_seconds > 0 ? `，停留 ${streakMin}m${streakSec}s` : '';
            homeStatus.innerText = `${tag}（距家 ${s.distance_m}m${streakText}）`;
            if (s.event === 'arrived_home') speak('歡迎回家');
            else if (s.event === 'left_home') speak('已偵測到出門');
        }

        // 模式切換
        modeToggle.addEventListener('click', () => {
            if (currentMode === 'navigation') {
                currentMode = 'assistant';
                modeIndicator.innerText = "🔇 助理模式";
                modeIndicator.className = 'asst-mode';
                modeToggle.innerText = "🔄 切換為導航模式";
                statusText.innerText = "已切換為助理模式，警告只顯示在螢幕上";
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                speak("助理模式");
            } else {
                currentMode = 'navigation';
                modeIndicator.innerText = "🔊 導航模式";
                modeIndicator.className = 'nav-mode';
                modeToggle.innerText = "🔄 切換為助理模式";
                statusText.innerText = "已切換為導航模式，語音警告已開啟";
                speak("導航模式");
            }
        });

        btnStart.addEventListener('click', () => {
            if (!isRunning) {
                isRunning = true;
                btnStart.innerText = "停止導航";
                btnStart.style.backgroundColor = "#ff4444";
                btnStart.style.color = "#fff";
                statusText.innerText = "系統已啟動，環境偵測中...";
                
                speak("導航系統已經啟動");
                startCamera().then(() => {
                    // 每秒偵測一次，但因為上面有了 isAnalyzing 鎖，所以實際上會等算完才拍下一張
                    analyzeInterval = setInterval(captureAndAnalyze, 1000);
                });
                startGpsTracking();
            } else {
                isRunning = false;
                btnStart.innerText = "啟動導航";
                btnStart.style.backgroundColor = "#FFEA00";
                btnStart.style.color = "#000";
                statusText.innerText = "系統已暫停";
                clearInterval(analyzeInterval);
                stopGpsTracking();
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                }
                speak("系統已停用");

                // 停止相機以省電
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }
            }
        });

        // ============== 行事曆 UI ==============
        const btnSchedule = document.getElementById('btnSchedule');
        const schedulePanel = document.getElementById('schedulePanel');
        const btnScheduleVoice = document.getElementById('btnScheduleVoice');
        const scheduleForm = document.getElementById('scheduleForm');
        const scheduleTodayList = document.getElementById('scheduleTodayList');

        let scheduleVoiceStream = null;
        let scheduleVoiceContext = null;
        let scheduleRecordingData = [];
        let isScheduleRecording = false;
        let scheduleScriptProcessor = null;

        btnSchedule.addEventListener('click', async () => {
            if (schedulePanel.style.display === 'none') {
                schedulePanel.style.display = 'flex';
                loadScheduleToday();
            } else {
                schedulePanel.style.display = 'none';
            }
        });

        async function loadScheduleToday() {
            scheduleTodayList.innerHTML = '<div class="schedule-empty">載入中...</div>';
            try {
                const r = await fetch('/api/schedule/today');
                const result = await r.json();
                if (!result.ok) {
                    scheduleTodayList.innerHTML = `<div class="schedule-empty">${result.error}</div>`;
                    return;
                }
                if (!result.events || result.events.length === 0) {
                    scheduleTodayList.innerHTML = '<div class="schedule-empty">今天沒有行程</div>';
                    return;
                }
                scheduleTodayList.innerHTML = result.events.map(e => {
                    const start = e.start ? new Date(e.start).toLocaleString('zh-TW', { hour: '2-digit', minute: '2-digit', month: 'numeric', day: 'numeric' }) : '';
                    const end = e.end ? new Date(e.end).toLocaleString('zh-TW', { hour: '2-digit', minute: '2-digit' }) : '';
                    const timeStr = end ? `${start} ~ ${end}` : start;
                    return `<div class="schedule-event-card"><div class="event-title">${e.title || '(無標題)'}</div><div class="event-time">${timeStr}</div>${e.location ? `<div class="event-location">📍 ${e.location}</div>` : ''}</div>`;
                }).join('');
            } catch (e) {
                scheduleTodayList.innerHTML = '<div class="schedule-empty">載入失敗</div>';
            }
        }

        // 錄音：開始
        btnScheduleVoice.addEventListener('click', async () => {
            if (isScheduleRecording) {
                // 停止錄音並發送
                isScheduleRecording = false;
                btnScheduleVoice.innerText = '🎤 語音新增行事曆';
                statusText.innerText = '處理中，請稍候...';

                if (scheduleScriptProcessor) scheduleScriptProcessor.disconnect();
                if (scheduleVoiceStream) scheduleVoiceStream.getTracks().forEach(t => t.stop());
                if (scheduleVoiceContext && scheduleVoiceContext.state !== 'closed') scheduleVoiceContext.close();

                let totalLen = scheduleRecordingData.reduce((a, v) => a + v.length, 0);
                let merged = new Float32Array(totalLen);
                let offset = 0;
                for (let d of scheduleRecordingData) { merged.set(d, offset); offset += d.length; }
                const wavBlob = encodeWAV(merged, 16000);

                try {
                    const resp = await fetch('/api/command_audio', { method: 'POST', body: wavBlob });
                    if (resp.ok) {
                        const result = await resp.json();
                        statusText.innerText = `🗣️: ${result.text || '(無內容)'}`;
                        if (result.text) {
                            // 把語音辨識結果送到 schedule_voice 讓 OpenClaw 解析
                            const sr = await fetch('/api/schedule_voice', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ command: result.text })
                            });
                            const srResult = await sr.json();
                            if (srResult.ok) {
                                speak(`已新增行事曆事件：${srResult.title}`);
                                scheduleForm.reset();
                                loadScheduleToday();
                            } else {
                                speak(`無法建立事件：${srResult.error}`);
                            }
                        }
                    }
                } catch (e) {
                    statusText.innerText = '無法連線伺服器';
                }
                scheduleRecordingData = [];
                return;
            }

            // 開始錄音
            isScheduleRecording = true;
            scheduleRecordingData = [];
            btnScheduleVoice.innerText = '🛑 錄音中...';
            statusText.innerText = '🔴 錄音中，請講話（如：明天九點看醫生）';

            try {
                scheduleVoiceStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                const AudioCtxCls = window.AudioContext || window.webkitAudioContext;
                scheduleVoiceContext = new AudioCtxCls({ sampleRate: 16000 });
                const src = scheduleVoiceContext.createMediaStreamSource(scheduleVoiceStream);
                scheduleScriptProcessor = scheduleVoiceContext.createScriptProcessor(4096, 1, 1);
                scheduleScriptProcessor.onaudioprocess = (e) => {
                    scheduleRecordingData.push(new Float32Array(e.inputBuffer.getChannelData(0)));
                };
                src.connect(scheduleScriptProcessor);
                scheduleScriptProcessor.connect(scheduleVoiceContext.destination);
            } catch (e) {
                isScheduleRecording = false;
                btnScheduleVoice.innerText = '🎤 語音新增行事曆';
                statusText.innerText = '無法取得麥克風權限';
            }
        });

        // 手動表單送出
        scheduleForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('scheduleTitle').value;
            const start = document.getElementById('scheduleStart').value;
            const end = document.getElementById('scheduleEnd').value;
            const location = document.getElementById('scheduleLocation').value;

            if (!title || !start) {
                speak('請填寫標題和開始時間');
                return;
            }

            try {
                const resp = await fetch('/api/schedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, start, end: end || null, location: location || null })
                });
                const result = await resp.json();
                if (result.ok) {
                    speak(`已新增行事曆事件：${title}`);
                    scheduleForm.reset();
                    loadScheduleToday();
                } else {
                    speak(`新增失敗：${result.error}`);
                }
            } catch (e) {
                speak('無法連線伺服器');
            }
        });
    </script>
    </div>
</body>
</html>
